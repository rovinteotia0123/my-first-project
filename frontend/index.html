<!DOCTYPE html>
<html>
<head>
    <title>Cloud AI Dashboard</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        .light {
            background: #ffffff;
            color: black;
        }

        .container {
            padding: 20px;
        }

        .cards {
            display: flex;
            gap: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            flex: 1;
            text-align: center;
        }

        .light .card {
            background: #f1f5f9;
            color: black;
        }

        input, button {
            padding: 10px;
            margin-top: 10px;
        }

        .light input {
            background: white;
            color: black;
            border: 1px solid #ccc;
        }

        .light button {
            background: #2563eb;
            color: white;
        }

        .toggle {
            float: right;
        }

        #dashboard {
            display: none;
        }

        #loginBox {
            text-align: center;
            margin-top: 100px;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

        th {
            background: #1e293b;
        }

        .light th {
            background: #ddd;
        }
    </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
    <h2>Login</h2>
    <input id="user" placeholder="Username"><br>
    <input id="pass" type="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="container">

    <button class="toggle" onclick="toggleTheme()">Light Mode</button>

    <h2>Cloud Cost Intelligence Dashboard</h2>
    <p style="color:#94a3b8;">AI-based cloud cost prediction and optimization system</p>

    <div class="cards">
        <div class="card">
            <h4>Current Cost</h4>
            <h2 id="current">--</h2>
        </div>

        <div class="card">
            <h4>Predicted Cost</h4>
            <h2 id="predicted">--</h2>
        </div>

        <div class="card">
            <h4>Recommendation</h4>
            <p id="rec">--</p>
        </div>
    </div>

    <br>

    <input id="usage" type="number" placeholder="Enter cost (100 - 5000)">
    <br>
    <button onclick="predict()">Predict</button>

    <canvas id="chart"></canvas>

    <!-- 🔥 HISTORY TABLE -->
    <h3>History</h3>
    <table border="1" id="historyTable">
        <tr>
            <th>Current</th>
            <th>Predicted</th>
            <th>Time</th>
        </tr>
    </table>

</div>

<script>
let chart;
const BASE_URL = "http://127.0.0.1:5000";

// LOGIN
async function login() {
    const username = document.getElementById("user").value;
    const password = document.getElementById("pass").value;

    try {
        const res = await fetch(`${BASE_URL}/login`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({username, password})
        });

        const data = await res.json();

        if (data.status === "success") {
            document.getElementById("loginBox").style.display = "none";
            document.getElementById("dashboard").style.display = "block";
            loadCost();
            loadHistory();
        } else {
            alert("Invalid credentials");
        }

    } catch {
        alert("Server error");
    }
}

// LOAD COST
async function loadCost() {
    try {
        const res = await fetch(`${BASE_URL}/cost`);
        const data = await res.json();
        updateUI(data);
    } catch {
        alert("Backend not running");
    }
}

// PREDICT
async function predict() {
    const value = document.getElementById("usage").value;

    if (!value || value < 100) {
        alert("Enter realistic cost (>=100)");
        return;
    }

    try {
        const res = await fetch(`${BASE_URL}/predict/${value}`);
        const data = await res.json();

        updateUI(data);
        drawChart(data.current_cost, data.predicted_cost);
        loadHistory(); // refresh history after prediction

    } catch {
        alert("Error connecting backend");
    }
}

// UPDATE UI (🔥 FIXED RISK LOGIC)
function updateUI(data) {
    document.getElementById("current").innerText = "₹ " + data.current_cost;
    document.getElementById("predicted").innerText = "₹ " + data.predicted_cost;

    const diff = data.predicted_cost - data.current_cost;

    let risk = "";
    let color = "";

    if (diff > 800) {
        risk = "🔴 High Risk";
        color = "red";
    } 
    else if (diff > 200) {
        risk = "🟡 Moderate Risk";
        color = "orange";
    } 
    else {
        risk = "🟢 Stable";
        color = "green";
    }

    document.getElementById("rec").innerHTML =
        data.recommendation +
        `<br><b style="color:${color}">${risk}</b>`;
}

// BAR CHART
function drawChart(currentCost, predictedCost) {
    const ctx = document.getElementById("chart");

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: "bar",
        data: {
            labels: ["Current", "Predicted"],
            datasets: [{
                label: "Cost Comparison",
                data: [currentCost, predictedCost],
                backgroundColor: ["#3b82f6", "#10b981"]
            }]
        }
    });
}

// 🔥 HISTORY (TABLE + CHART)
async function loadHistory() {
    try {
        const res = await fetch(`${BASE_URL}/history`);
        const data = await res.json();

        const table = document.getElementById("historyTable");

        table.innerHTML = `
            <tr>
                <th>Current</th>
                <th>Predicted</th>
                <th>Time</th>
            </tr>
        `;

        if (!data.length) return;

        data.forEach(row => {
            table.innerHTML += `
                <tr>
                    <td>${row[1]}</td>
                    <td>${row[2]}</td>
                    <td>${row[3]}</td>
                </tr>
            `;
        });

        // chart also
        const costs = data.map(d => d[1]);
        const predicted = data.map(d => d[2]);

        drawHistoryChart(costs, predicted);

    } catch {
        alert("Error loading history");
    }
}

// HISTORY CHART
function drawHistoryChart(costs, predicted) {
    const ctx = document.getElementById("chart");

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: costs.map((_, i) => "Run " + (i + 1)),
            datasets: [
                {
                    label: "Current Cost",
                    data: costs,
                    borderColor: "blue",
                    fill: false
                },
                {
                    label: "Predicted Cost",
                    data: predicted,
                    borderColor: "green",
                    fill: false
                }
            ]
        }
    });
}

// THEME
function toggleTheme() {
    document.body.classList.toggle("light");

    const btn = document.querySelector(".toggle");
    btn.innerText = document.body.classList.contains("light")
        ? "Dark Mode"
        : "Light Mode";
}
</script>

</body>
</html>
