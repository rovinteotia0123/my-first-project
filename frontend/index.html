<!DOCTYPE html>
<html>
<head>
    <title>Cloud AI Dashboard</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        .light {
            background: #ffffff;
            color: black;
        }

        .container {
            padding: 20px;
        }

        .cards {
            display: flex;
            gap: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            flex: 1;
            text-align: center;
        }

        input, button {
            padding: 10px;
            margin-top: 10px;
        }

        .toggle {
            float: right;
        }
    </style>
</head>

<body>

<div class="container">

    <button class="toggle" onclick="toggleTheme()">Light Mode</button>

    <h2>Cloud Cost Intelligence Dashboard</h2>

    <div class="cards">
        <div class="card">
            <h4>Current Cost</h4>
            <h2 id="current">--</h2>
        </div>

        <div class="card">
            <h4>Predicted Cost</h4>
            <h2 id="predicted">--</h2>
        </div>

        <div class="card">
            <h4>Recommendation</h4>
            <p id="rec">--</p>
        </div>
    </div>

    <br>

    <input id="usage" type="number" placeholder="Enter cost (100 - 5000)">
    <button onclick="predict()">Predict</button>

    <canvas id="chart"></canvas>

</div>

<script>
let chart;
const BASE_URL = "http://127.0.0.1:5000";

// LOAD COST
async function loadCost() {
    try {
        const res = await fetch(`${BASE_URL}/cost`);
        const data = await res.json();
        updateUI(data);
    } catch {
        alert("Backend not running");
    }
}

// PREDICT
async function predict() {
    const value = document.getElementById("usage").value;

    if (!value || value < 100) {
        alert("Enter realistic cost (>=100)");
        return;
    }

    const res = await fetch(`${BASE_URL}/predict/${value}`);
    const data = await res.json();

    updateUI(data);
    drawChart(data.current_cost, data.predicted_cost);
}

// UPDATE UI
function updateUI(data) {
    document.getElementById("current").innerText = "₹ " + data.current_cost;
    document.getElementById("predicted").innerText = "₹ " + data.predicted_cost;

    const change = ((data.predicted_cost - data.current_cost) / data.current_cost) * 100;

    let risk = "";
    let color = "";

    if (change > 10) {
        risk = "🔴 High Risk";
        color = "red";
    } else if (change > 5) {
        risk = "🟡 Moderate";
        color = "orange";
    } else {
        risk = "🟢 Stable";
        color = "green";
    }

    document.getElementById("rec").innerHTML =
        data.recommendation + "<br><b style='color:" + color + "'>" + risk + "</b>";
}

// DRAW CHART
function drawChart(currentCost, predictedCost) {
    const ctx = document.getElementById("chart");

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: "bar",
        data: {
            labels: ["Current", "Predicted"],
            datasets: [{
                label: "Cost Comparison",
                data: [currentCost, predictedCost],
                backgroundColor: ["#3b82f6", "#10b981"]
            }]
        }
    });
}

// THEME TOGGLE
function toggleTheme() {
    document.body.classList.toggle("light");

    const btn = document.querySelector(".toggle");
    btn.innerText = document.body.classList.contains("light")
        ? "Dark Mode"
        : "Light Mode";
}

// AUTO LOAD
window.onload = loadCost;
</script>

</body>
</html>
