<!DOCTYPE html>
<html>
<head>
    <title>Cloud AI Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            display: flex;
            background: #0f172a;
            color: white;
        }

        .sidebar {
            width: 220px;
            background: #020617;
            padding: 20px;
            height: 100vh;
        }

        .sidebar h2 {
            font-size: 18px;
            margin-bottom: 30px;
        }

        .sidebar button {
            width: 100%;
            margin-bottom: 10px;
            padding: 10px;
            background: #1e293b;
            border: none;
            color: white;
            cursor: pointer;
        }

        .main {
            flex: 1;
            padding: 20px;
        }

        .cards {
            display: flex;
            gap: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            flex: 1;
        }

        canvas {
            margin-top: 30px;
            background: white;
            border-radius: 10px;
        }

        input, button {
            padding: 8px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h2>☁ CloudAI</h2>
    <button onclick="loadCost()">Dashboard</button>
    <button onclick="loadHistory()">History</button>
</div>

<div class="main">

<h2>Cloud Cost Intelligence</h2>

<div class="cards">
    <div class="card">
        <h4>Current Cost</h4>
        <h2 id="current">--</h2>
    </div>

    <div class="card">
        <h4>Predicted Cost</h4>
        <h2 id="predicted">--</h2>
    </div>

    <div class="card">
        <h4>Recommendation</h4>
        <p id="rec">--</p>
    </div>
</div>

<br>

<input id="usage" type="number" placeholder="Enter cost">
<button onclick="predict()">Predict</button>

<canvas id="chart"></canvas>

</div>

<script>
let chart;

async function loadCost() {
    const res = await fetch("/cost");
    const data = await res.json();

    current.innerText = "₹ " + data.current_cost;
    predicted.innerText = "₹ " + data.predicted_cost;
    rec.innerText = data.recommendation;
}

async function predict() {
    const res = await fetch(`/predict/${usage.value}`);
    const data = await res.json();

    current.innerText = "₹ " + data.current_cost;
    predicted.innerText = "₹ " + data.predicted_cost;
    rec.innerText = data.recommendation;

    drawChart([data.current_cost, data.predicted_cost]);
}

async function loadHistory() {
    const res = await fetch("/history");
    const data = await res.json();

    const costs = data.map(d => d[1]);
    const predicted = data.map(d => d[2]);

    drawChart(costs, predicted);
}

function drawChart(costs, predicted=[]) {
    const ctx = document.getElementById("chart");

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: costs.map((_, i) => "Point " + (i+1)),
            datasets: [
                { label: "Current", data: costs, borderColor: "blue" },
                { label: "Predicted", data: predicted, borderColor: "green" }
            ]
        }
    });
}

window.onload = loadCost;
</script>

</body>
</html>
